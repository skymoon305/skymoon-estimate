<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SKYMOON · Estimates</title>
<meta name="description" content="SKYMOON Fix & Design — Professional Remodeling Estimates, Miami FL">
<meta name="theme-color" content="#757064">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Montserrat:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ff:'Jost',system-ui,sans-serif;
  --bg:#F5F3EF;--bg2:#FFFFFF;--bg3:#F0EDE8;--bg4:#EAE6DF;
  --ink:#2C2A27;--ink2:#737065;--ink3:#9E9B95;
  --ac:#757064;--ac2:#B3A48F;--ac3:rgba(117,112,100,.1);
  --cr:#D2CEC4;--cr2:#E8E5DF;
  --bd:#D2CEC4;--bd2:#ECEAE5;
  --grn:#4A9B7A;--red:#C0624A;--blu:#5A7FA8;
  --hdr:linear-gradient(105deg,#7E7C79 0%,#B3A48F 100%);
  --r:6px;--r2:10px;
  font-size:16.8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#F5F3EF 0%,#EDE9E3 100%);color:var(--ink);font-family:'Jost',system-ui,sans-serif;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--cr);border-radius:3px}

/* HEADER */
.hd{background:linear-gradient(135deg,#737065 0%,#8e8980 100%);height:62px;padding-top:env(safe-area-inset-top,0);padding:0 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(44,42,39,.28)}
.hd-brand{display:flex;align-items:center;gap:10px;cursor:pointer}
.hd-name{font-size:1.056rem;font-weight:700;letter-spacing:3px;color:#F5F3EF;text-transform:uppercase}
.hd-sub{font-size:0.684rem;color:#FFFFFF;letter-spacing:2.5px;text-transform:uppercase;margin-top:1px}
.hd-nav{display:flex;gap:7px;align-items:center}
.hd-sel{padding:6px 12px;font-size:0.948rem;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.22);border-radius:6px;color:#F5F3EF;font-family:'Jost',system-ui,sans-serif;outline:none;cursor:pointer}
.hd-sel option{background:#757064}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--r);font-family:'Jost',system-ui,sans-serif;font-size:0.972rem;font-weight:500;cursor:pointer;border:none;transition:all .17s;white-space:nowrap;letter-spacing:.2px}
.btn-p{background:#B3A48F;color:#2C2A27;font-weight:600}
.btn-p:hover{background:#C4B5A0;transform:translateY(-1px)}
.btn-g{background:transparent;color:rgba(245,243,239,.78);border:1px solid rgba(245,243,239,.22)}
.btn-g:hover{color:#F5F3EF;background:rgba(255,255,255,.1);border-color:rgba(245,243,239,.45)}
.btn-o{background:var(--ac3);color:var(--ac);border:1px solid var(--bd)}
.btn-o:hover{background:rgba(117,112,100,.18)}
.btn-m{background:transparent;color:var(--ink2);border:1px solid var(--bd)}
.btn-m:hover{color:var(--ink);border-color:var(--ac2);background:var(--bg3)}
.btn-d{background:rgba(192,98,74,.08);color:var(--red);border:1px solid rgba(192,98,74,.2)}
.btn-d:hover{background:rgba(192,98,74,.15)}
.btn-sm{padding:4px 11px;font-size:0.9rem}
.btn-lg{padding:10px 24px;font-size:1.08rem;font-weight:600}
.btn-icon{padding:5px 8px}

/* DASHBOARD */
.dash{padding:2rem 2.25rem 3rem;max-width:1180px;margin:0 auto}
.dash-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.dash-title{font-size:1.7rem;font-weight:600;letter-spacing:-.3px}
.dash-sub{color:var(--ink3);font-size:1.008rem;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:2rem}
.stat{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:1rem 1.3rem}
.stat-l{font-size:0.756rem;color:var(--ink3);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:6px}
.stat-v{font-size:1.65rem;font-weight:600}
.c-ac{color:var(--ac)}.c-gn{color:var(--grn)}

/* TABLE */
.tbl-wrap{border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.tbl-hdr,.tbl-row{display:grid;grid-template-columns:130px 1fr 195px 110px 130px 155px;gap:12px;align-items:center;padding:.75rem 1.25rem}
.tbl-hdr{background:var(--bg3);border-bottom:1px solid var(--bd);font-size:0.756rem;letter-spacing:1.8px;text-transform:uppercase;color:var(--ink3)}
.tbl-row{background:#fff;border-bottom:1px solid var(--bd2);cursor:default;transition:background .13s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--bg3)}
.q-num{font-size:0.972rem;font-weight:600;color:var(--ac);letter-spacing:.4px}
.q-nm{font-weight:500;font-size:1.044rem}
.q-dt{font-size:0.888rem;color:var(--ink3);margin-top:2px}
.q-am{font-size:1.116rem;font-weight:600}
.q-ac{display:flex;gap:5px;justify-content:flex-end}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.804rem;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.b-draft{background:rgba(158,155,149,.1);color:var(--ink3);border:1px solid rgba(158,155,149,.28)}
.b-sent{background:rgba(90,127,168,.1);color:var(--blu);border:1px solid rgba(90,127,168,.25)}
.b-approved{background:rgba(74,155,122,.1);color:var(--grn);border:1px solid rgba(74,155,122,.25)}

/* BUILDER */
.builder{display:grid;grid-template-columns:1fr 308px;min-height:calc(100vh - 62px)}
.b-main{padding:1.75rem;overflow-y:auto;border-right:1px solid var(--bd);background:var(--bg)}
.b-side{padding:1.5rem;background:#fff;overflow-y:auto}

/* TABS */
.tabs{display:flex;gap:3px;padding:4px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:1.5rem}
.tab{flex:1;padding:7px 8px;border-radius:5px;font-size:0.9rem;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--ink3);font-family:'Jost',system-ui,sans-serif;transition:all .17s;text-align:center}
.tab.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.tab:hover:not(.on){color:var(--ink)}

/* FORM */
.sec-t{font-size:.98rem;font-weight:600;color:var(--ink);padding-bottom:9px;border-bottom:1px solid var(--bd);margin-bottom:1.2rem;display:flex;align-items:center;gap:9px}
.sec-t::before{content:'';width:2px;height:15px;background:var(--ac2);border-radius:2px;flex-shrink:0}
.fg{display:flex;flex-direction:column;gap:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.fcol2{grid-column:1/-1}
.fl{font-size:0.768rem;font-weight:500;color:var(--ink3);letter-spacing:.7px;text-transform:uppercase}
.fl .vis{font-size:0.708rem;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px}
.fl .vis-g{background:rgba(74,155,122,.12);color:var(--grn)}
.fl .vis-r{background:rgba(192,98,74,.1);color:var(--red)}
.fi,.fs,.fta{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:8px 11px;color:var(--ink);font-family:'Jost',system-ui,sans-serif;font-size:1.044rem;outline:none;width:100%;transition:border-color .17s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--ac)}
.fi::placeholder,.fta::placeholder{color:var(--cr)}
.fta{resize:vertical;min-height:78px;line-height:1.6}
.row{display:flex;gap:8px}

/* ITEMS */
.itbl{width:100%;border-collapse:collapse}
.itbl th{font-size:0.732rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink3);padding:7px 5px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
.itbl td{padding:3px 2px;vertical-align:middle;border-bottom:1px solid var(--bd2)}
.itbl tr:hover td{background:rgba(117,112,100,.03)}
.ii{background:transparent;border:1px solid transparent;border-radius:5px;padding:5px 6px;color:var(--ink);font-family:'Jost',system-ui,sans-serif;font-size:0.972rem;outline:none;width:100%;transition:all .13s}
.ii:focus{background:var(--bg3);border-color:var(--ac)}
.ii::placeholder{color:var(--cr)}
.iis{background:transparent;border:1px solid transparent;border-radius:5px;padding:5px 3px;color:var(--ink2);font-family:'Jost',system-ui,sans-serif;font-size:0.876rem;outline:none;width:100%;cursor:pointer}
.iis:focus{background:var(--bg3);border-color:var(--ac)}
.i-amt{font-size:1.056rem;font-weight:600;color:var(--ac);padding:5px 5px;white-space:nowrap}
.cpill{display:inline-block;background:var(--ac3);color:var(--ac);padding:1px 6px;border-radius:3px;font-size:0.684rem;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:2px}

/* PICKER */
.mover{position:fixed;inset:0;background:rgba(44,42,39,.58);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:1.75rem;width:680px;max-width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(44,42,39,.18)}
.modal-t{font-size:1.05rem;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.2rem}

.cb-wrap{display:flex;flex-direction:column;gap:2px}
.cb-wrap .cb{flex:1}

.cb{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px 11px;cursor:pointer;text-align:left;transition:all .13s;font-family:'Jost',system-ui,sans-serif;color:var(--ink)}
.cb:hover,.cb.sel{background:var(--ac3);border-color:var(--ac2)}
.cb-ic{font-size:1rem;display:block;margin-bottom:4px}
.cb-nm{font-size:0.888rem;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:.75rem}
.chip{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:0.936rem;color:var(--ink);font-family:'Jost',system-ui,sans-serif;transition:all .13s}
.chip:hover{background:var(--ac3);border-color:var(--ac2);color:var(--ac)}
.chip-d{border-style:dashed}

/* SIDEBAR */
.s-t{font-size:0.96rem;font-weight:700;color:var(--ink);margin-bottom:.85rem;padding-bottom:8px;border-bottom:1px solid var(--bd);letter-spacing:.8px;text-transform:uppercase}
.s-lbl{font-size:0.744rem;color:var(--ink3);text-transform:uppercase;letter-spacing:1.3px;margin-bottom:5px;display:block;font-weight:500}
.s-in{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:8px 11px;color:var(--ink);font-family:'Jost',system-ui,sans-serif;font-size:1.044rem;outline:none;width:100%;transition:border-color .17s}
.s-in:focus{border-color:var(--ac)}
.rbg{display:flex;gap:5px;margin-bottom:7px}
.rb{flex:1;padding:6px;border-radius:var(--r);border:1px solid var(--bd);background:transparent;color:var(--ink3);font-size:0.864rem;cursor:pointer;font-family:'Jost',system-ui,sans-serif;font-weight:500;transition:all .17s;text-align:center}
.rb.on{background:var(--ac3);border-color:var(--ac2);color:var(--ac)}
.trow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd2)}
.tgl-lbl{font-size:0.96rem;color:var(--ink2);font-weight:500}
.tgl{width:34px;height:19px;background:var(--cr);border-radius:10px;position:relative;cursor:pointer;border:none;transition:background .17s;flex-shrink:0}
.tgl.on{background:var(--ac)}
.tgl::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .17s}
.tgl.on::after{left:18px}
.tot-c{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1rem;margin-top:.85rem}
.tr-r{display:flex;justify-content:space-between;padding:4px 0;font-size:0.984rem;color:var(--ink3);border-bottom:1px solid var(--bd2)}
.tr-r:last-child{border-bottom:none}
.tr-v{font-weight:500;color:var(--ink)}
.tr-div{border:none;border-top:1px solid var(--bd);margin:6px 0}
.tr-tot{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.tr-tl{font-size:0.948rem;font-weight:700;color:var(--ink);letter-spacing:.5px;text-transform:uppercase}
.tr-tv{font-size:1.2rem;font-weight:700;color:var(--ac)}

/* EMPTY */
.empty{text-align:center;padding:4rem 2rem;color:var(--ink3)}
.empty-i{font-size:2rem;margin-bottom:.7rem;opacity:.35}
.empty-t{font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:6px}

/* PREVIEW */
.prev-wrap{max-width:870px;margin:0 auto;padding:2rem}
.prev-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.prev-t{font-size:.98rem;font-weight:600}

/* QUOTE PAPER */
.qpaper{background:#fff;color:#2C2A27;font-family:'Jost',system-ui,sans-serif;border-radius:var(--r2);overflow:hidden;box-shadow:0 8px 40px rgba(44,42,39,.18)}
.qhd{background:linear-gradient(105deg,#7E7C79 0%,#B3A48F 100%);padding:2rem 2.5rem;display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap}
.qco-lft{display:flex;align-items:flex-start;gap:14px}
.qco-nm{font-size:1.3rem;font-weight:700;color:#D8D3CB;letter-spacing:3px;text-transform:uppercase;line-height:1.1}
.qco-tg{font-size:0.684rem;color:#C0B9AF;letter-spacing:3px;text-transform:uppercase;margin-top:3px}
.qco-dt{font-size:0.864rem;color:rgba(210,206,196,.75);margin-top:9px;line-height:1.9}
.qbadge{text-align:right;flex-shrink:0}
.qb-lbl{font-size:.98rem;font-weight:700;color:#F5F3EF;letter-spacing:4px;text-transform:uppercase}
.qb-num{font-size:0.996rem;color:#C8C1B7;font-weight:600;letter-spacing:1.5px;margin-top:5px}
.qb-dt{font-size:0.852rem;color:#DDD8D0;margin-top:3px}
.qbar{height:3px;background:linear-gradient(90deg,#7E7C79,#B3A48F,#D2CEC4)}
.qbody{padding:2rem 2.5rem}
.qcr{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-bottom:1.75rem;padding-bottom:1.5rem;border-bottom:1px solid #e9ecef}
.qsl{font-size:0.708rem;font-weight:700;color:#9E9B95;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:8px}
.qcn{font-size:.98rem;font-weight:600;color:#2C2A27;margin-bottom:3px}
.qcd{font-size:0.936rem;color:#6b7280;line-height:1.8}
.qitbl{width:100%;border-collapse:collapse;margin-bottom:1.5rem;font-size:0.972rem}
.qitbl th{background:#F0EDE8;color:#737065;font-size:0.708rem;letter-spacing:2px;text-transform:uppercase;padding:9px 10px;text-align:left;border-bottom:1px solid #D2CEC4}
.qitbl th:last-child{text-align:right}
.qitbl td{padding:9px 10px;border-bottom:1px solid #f0f0f0;color:#374151;vertical-align:top}
.qitbl td:last-child{text-align:right;font-weight:600;color:#2C2A27}
.qitbl tr:nth-child(even) td{background:#fafafa}
.qic{display:inline-block;background:rgba(176,164,145,.12);color:#757064;padding:1px 6px;border-radius:2px;font-size:0.684rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qin{font-weight:600;color:#2C2A27}
.qid{font-size:0.864rem;color:#9ca3af;margin-top:1px}
.qtots{margin-left:auto;width:300px}
.qtr{display:flex;justify-content:space-between;padding:5px 0;font-size:0.972rem;color:#6b7280;border-bottom:1px solid #f0f0f0}
.qtrv{font-weight:600;color:#374151}
.qtf{background:#F0EDE8;border:1px solid #D2CEC4;padding:11px 14px;border-radius:6px;display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.qtfl{font-size:0.84rem;font-weight:700;color:#737065;letter-spacing:2px;text-transform:uppercase}
.qtfv{font-size:1.28rem;font-weight:700;color:#2C2A27}
.qft{padding:1.5rem 2.5rem;background:#F5F3EF;border-top:1px solid #D2CEC4}
.qtm{font-size:0.84rem;color:#9ca3af;line-height:1.75;white-space:pre-line}
.qsig{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1.75rem;padding-top:1.5rem;border-top:1px solid #e9ecef}
.sig-l{border-top:1px solid #d1d5db;padding-top:5px;font-size:0.828rem;color:#9ca3af}
.qfco{text-align:center;margin-top:1.2rem;font-size:0.744rem;color:#b0a491;letter-spacing:1.5px;text-transform:uppercase}

/* SETTINGS */
.sm{background:#fff;border:1px solid var(--bd);border-radius:var(--r2);padding:2rem;width:540px;max-width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(44,42,39,.15)}

@media(max-width:900px){
  .builder{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .tbl-hdr,.tbl-row{grid-template-columns:110px 1fr 90px 115px}
  .tbl-hdr>*:nth-child(3),.tbl-row>*:nth-child(3),
  .tbl-hdr>*:nth-child(5),.tbl-row>*:nth-child(5){display:none}
  .cgrid{grid-template-columns:repeat(2,1fr)}
  .qsig{grid-template-columns:1fr}
}

/* CONTRACT */
.contract-wrap{max-width:900px;margin:0 auto;padding:2rem}
.contract-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
.contract-doc{background:#fff;color:#1a1a1a;font-family:'Jost',system-ui,sans-serif;border-radius:var(--r2);overflow:hidden;box-shadow:0 8px 40px rgba(44,42,39,.18);line-height:1.7}
.ct-hd{background:linear-gradient(105deg,#7E7C79 0%,#B3A48F 100%);padding:1.75rem 2.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
.ct-hd-l{display:flex;align-items:center;gap:12px}
.ct-co{font-size:1.2rem;font-weight:700;color:#D8D3CB;letter-spacing:2.5px;text-transform:uppercase}
.ct-tg{font-size:0.684rem;color:#C0B9AF;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.ct-badge{text-align:right}
.ct-badge-t{font-size:0.9rem;font-weight:700;color:#D8D3CB;letter-spacing:3px;text-transform:uppercase}
.ct-badge-n{font-size:0.936rem;color:#DDD8D0;margin-top:3px;letter-spacing:1px}
.ct-bar{height:3px;background:linear-gradient(90deg,#7E7C79,#B3A48F,#D2CEC4)}
.ct-body{padding:2.25rem 2.5rem}
.ct-lang-hd{background:#F5F3EF;border-bottom:2px solid #757064;padding:.6rem 2.5rem;display:flex;align-items:center;gap:10px}
.ct-lang-pill{font-size:0.756rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:3px}
.ct-lang-es{background:#757064;color:#F5F3EF}
.ct-lang-en{background:#B3A48F;color:#fff}
.ct-title{font-size:1.1rem;font-weight:700;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:.35rem;color:#2C2A27}
.ct-subtitle{font-size:0.936rem;text-align:center;color:#737065;margin-bottom:1.5rem;letter-spacing:.5px}
.ct-parties{background:#F5F3EF;border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;border-left:3px solid #B3A48F}
.ct-p{font-size:0.996rem;margin-bottom:.5rem;color:#374151;line-height:1.65}
.ct-p:last-child{margin-bottom:0}
.ct-p strong{color:#2C2A27;font-weight:600}
.ct-sec{margin-bottom:1.5rem;page-break-inside:avoid;break-inside:avoid}
.ct-sec-t{font-size:0.864rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#757064;border-bottom:1px solid #D2CEC4;padding-bottom:6px;margin-bottom:.85rem}
.ct-cl{font-size:0.996rem;color:#374151;margin-bottom:.75rem;line-height:1.7;display:flex;gap:.5rem;page-break-inside:avoid;break-inside:avoid}

.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:.75rem}
.photo-item{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:4/3;background:var(--bg3);border:1px solid var(--bd)}

/* PHOTO IN PDF */

/* THIRD PARTY AUTHORIZATION */
.tpa-doc{background:#fff;color:#1a1a1a;font-family:'Jost',system-ui,sans-serif;border-radius:var(--r2);overflow:hidden;box-shadow:0 8px 40px rgba(44,42,39,.18);line-height:1.7;margin-top:1.5rem}

.tpa-field{margin-bottom:1.1rem}
.tpa-field-lbl{font-size:0.744rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#757064;margin-bottom:5px;display:block}
.tpa-field-val{font-size:1.008rem;color:#374151;line-height:1.7;padding:.6rem .85rem;background:#F5F3EF;border-radius:5px;border-left:2px solid #D2CEC4}
.tpa-body-txt{font-size:1.008rem;color:#374151;line-height:1.75;margin-bottom:1rem;text-align:justify}
.tpa-warn{background:#FFF8F0;border:1px solid #E8D5B0;border-radius:6px;padding:.85rem 1rem;margin:.85rem 0;font-size:0.948rem;color:#7A5C1E;line-height:1.65}
.tpa-warn strong{display:block;margin-bottom:3px;font-size:0.816rem;letter-spacing:1px;text-transform:uppercase}
.tpa-sig{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;margin-top:2rem;padding-top:1.5rem;border-top:1px solid #D2CEC4}
.tpa-sig-blk{font-size:0.936rem;color:#6b7280;line-height:1.9}
.tpa-sig-line{border-top:1.5px solid #2C2A27;padding-top:5px;margin-top:2.5rem;font-size:0.828rem;color:#9ca3af}
.tpa-sig-name{font-weight:600;color:#2C2A27;font-size:1.02rem}
.tpa-notary{background:#F5F3EF;border:1px solid #D2CEC4;border-radius:8px;padding:1.1rem 1.4rem;margin-top:1.5rem;font-size:0.936rem;color:#737065;line-height:1.9}
.tpa-notary-t{font-size:0.756rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#B3A48F;margin-bottom:.5rem;display:block}

/* ── PREMIUM DESIGN SYSTEM ───────────────────────────────────────────── */
:root{
  --glass-bg: rgba(245,243,239,0.72);
  --glass-border: rgba(210,206,196,0.45);
  --glass-blur: blur(18px);
  --glass-dark-bg: rgba(44,42,39,0.55);
  --glass-dark-border: rgba(210,206,196,0.15);
  --shadow-soft: 0 8px 32px rgba(44,42,39,0.12);
  --shadow-card: 0 2px 16px rgba(44,42,39,0.08);
}

/* HERO SECTION */
.dash-hero{
  position:relative;
  width:100%;
  height:320px;
  overflow:hidden;
  border-radius:var(--r2);
  margin-bottom:2rem;
}
.dash-hero-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  filter:brightness(.88) saturate(.85);
}
.dash-hero-glass{
  position:absolute;
  left:0;bottom:0;right:0;
  height:70%;
  background:linear-gradient(to top, rgba(44,42,39,.55) 0%, rgba(44,42,39,.2) 60%, transparent 100%);
}
.dash-hero-frosted{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  background:rgba(245,243,239,.07);
  backdrop-filter:blur(7px);
  -webkit-backdrop-filter:blur(7px);
  border:1px solid rgba(255,255,255,.12);

}

.dash-hero-skymoon{

}
.dash-hero-sky{
  font-weight:300;
}
.dash-hero-moon{
  font-weight:800;
}
.dash-hero-miami{

}

.dash-hero-title{

/* PREMIUM STAT CARDS */

/* PREMIUM BUILDER */

/* PREMIUM SIDEBAR TOTALS */

/* PREMIUM BUTTONS */

function calc(q){
  const sub=(q.items||[]).reduce((s,i)=>s+(+i.qty||0)*(+i.unitPrice||0),0);
  let disc=0;
  if(q.discountType==='pct') disc=sub*(+q.discountValue/100);
  else if(q.discountType==='fixed') disc=+q.discountValue||0;
  const after=sub-disc;
  const fee=q.feeType==='pct'?after*(+q.feeValue/100):(+q.feeValue||0);
  const txBase=q.taxBase==='subtotal+fee'?after+fee:q.taxBase==='fee_only'?fee:after;
  const tax=q.taxEnabled?txBase*(+q.taxRate/100):0;
  const total=after+fee+tax;
  return{sub,disc,after,fee,tax,total,balance:total-(+q.deposit||0)};
}

      <button class="btn btn-p btn-sm" onclick="newQ()">+ New Estimate</button>
      <button class="btn btn-g btn-sm btn-icon" onclick="S.showSettings=true;render()" title="Settings">⚙</button>`;
  } else if(S.view==='builder'&&S.q){
    nav=`
      <button class="btn btn-g btn-sm" onclick="saveAndGo('dash')">← Dashboard</button>
      <select class="hd-sel" onchange="S.q.status=this.value">
        <option value="draft" ${S.q.status==='draft'?'selected':''}>Draft</option>
        <option value="sent" ${S.q.status==='sent'?'selected':''}>Sent</option>
        <option value="approved" ${S.q.status==='approved'?'selected':''}>Approved</option>
      </select>
      <button class="btn btn-g btn-sm" onclick="saveAndPreview()">👁 Preview</button>
      <button class="btn btn-g btn-sm" onclick="saveQ();S.view='contract';render()">📄 Contract</button>
      <button class="btn btn-p btn-sm" onclick="saveQ()">💾 Save</button>
      <button class="btn btn-g btn-sm btn-icon" onclick="S.showSettings=true;render()" title="Settings">⚙</button>`;
  } else if(S.view==='preview'){
    nav=`
      <button class="btn btn-g btn-sm" onclick="S.view='builder';render()">← Edit</button>
      <button class="btn btn-g btn-sm" onclick="S.view='contract';render()">📄 Contract</button>
      <button class="btn btn-g btn-sm" onclick="S.view='tpa';render()">🔑 Auth Letter</button>
      <button class="btn btn-p btn-sm" onclick="window.print()">🖨 Print / PDF</button>`;
  } else if(S.view==='contract'){
    nav=`
      <button class="btn btn-g btn-sm" onclick="S.view='preview';render()">← Estimate</button>
      <button class="btn btn-g btn-sm" onclick="S.view='tpa';render()">🔑 Auth Letter</button>
      <button class="btn btn-p btn-sm" onclick="window.print()">🖨 Print / PDF</button>`;
  } else if(S.view==='tpa'){
    nav=`
      <button class="btn btn-g btn-sm" onclick="S.view='contract';render()">← Contract</button>
      <button class="btn btn-g btn-sm" onclick="S.view='preview';render()">📋 Estimate</button>
      <button class="btn btn-p btn-sm" onclick="window.print()">🖨 Print / PDF</button>`;
  } else {
    nav=`
      <button class="btn btn-g btn-sm" onclick="S.view='builder';render()">← Edit</button>
      <button class="btn btn-p btn-sm" onclick="window.print()">🖨 Print / PDF</button>`;
  }
  return `<header class="hd no-print">
    <div class="hd-brand" onclick="saveAndGo('dash')">
      ${LOGO_SM}
      <div style="display:flex;flex-direction:column;justify-content:center"><div class="hd-sub" style="margin-top:0">Fix &amp; Design · Estimates</div></div>
    </div>
    <div class="hd-nav">${nav}</div>
  </header>`;
}

  const rows=S.quotes.length===0?`
    <div class="empty">

// ─── BUILDER ─────────────────────────────────────────────────────────────────
function buildBuilder(){
  if(!S.q){S.view='dash';return buildDash();}
  const tabs=['client','items','notes','terms'];
  const labels=['👤 Client','📋 Items','📝 Notes','📄 Terms'];
  const tabHTML=tabs.map((t,i)=>`<button class="tab${S.tab===t?' on':''}" onclick="switchTab('${t}')">${labels[i]}</button>`).join('');
  const content=S.tab==='client'?buildClientTab():S.tab==='items'?buildItemsTab():S.tab==='notes'?buildNotesTab():buildTermsTab();
  return`<div class="builder">
    <div class="b-main">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <span style="font-size:1.2rem;font-weight:700;color:var(--ac);letter-spacing:.5px">${esc(S.q.number)}</span>
        <span style="color:var(--ink3);font-size:.84rem">${esc(S.q.client?.name||'New Estimate')}</span>
      </div>
      <div class="tabs">${tabHTML}</div>
      ${content}
    </div>
    <div class="b-side" id="sidebar">${buildSidebar()}</div>
  </div>`;
}

function buildClientTab(){
  const c=S.q.client||{};const p=S.q.property||{};
  return`<div>
    <div class="sec-t">Client Information</div>
    <div class="fg2">
      <div class="fg"><label class="fl">Client Name *</label><input class="fi" placeholder="John & Mary Smith" value="${esc(c.name)}" data-path="client.name" onchange="setQPath(this)" oninput="setQPath(this)"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" type="email" placeholder="client@email.com" value="${esc(c.email)}" data-path="client.email" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">Phone</label><input class="fi" placeholder="(305) 555-0000" value="${esc(c.phone)}" data-path="client.phone" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">Quote Date</label><input class="fi" type="date" value="${esc(S.q.quoteDate)}" data-path="quoteDate" onchange="setQPath(this)"></div>
      <div class="fg fcol2"><label class="fl">Mailing Address</label><input class="fi" placeholder="123 Ocean Drive" value="${esc(c.address)}" data-path="client.address" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">City</label><input class="fi" placeholder="Miami" value="${esc(c.city)}" data-path="client.city" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">State / ZIP</label>
        <div class="row"><input class="fi" placeholder="FL" value="${esc(c.state)}" data-path="client.state" onchange="setQPath(this)" style="width:64px;flex-shrink:0">
        <input class="fi" placeholder="33101" value="${esc(c.zip)}" data-path="client.zip" onchange="setQPath(this)"></div>
      </div>
    </div>
    <div class="sec-t" style="margin-top:1.5rem">Property Information</div>
    <div class="fg2">
      <div class="fg fcol2"><label class="fl">Property Address</label><input class="fi" placeholder="Address to be remodeled" value="${esc(p.address)}" data-path="property.address" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">City</label><input class="fi" placeholder="Miami Beach" value="${esc(p.city)}" data-path="property.city" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">State / ZIP</label>
        <div class="row"><input class="fi" placeholder="FL" value="${esc(p.state)}" data-path="property.state" onchange="setQPath(this)" style="width:64px;flex-shrink:0">
        <input class="fi" placeholder="33139" value="${esc(p.zip)}" data-path="property.zip" onchange="setQPath(this)"></div>
      </div>
      <div class="fg"><label class="fl">Property Type</label>
        <select class="fs" data-path="property.type" onchange="setQPath(this)">
          ${['','Single Family Home','Condo / Apartment','Townhouse','Commercial','Multi-Family'].map(t=>`<option value="${t}"${S.q.property?.type===t?' selected':''}>${t||'Select type...'}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label class="fl">Valid Until</label><input class="fi" type="date" value="${esc(S.q.validUntil)}" data-path="validUntil" onchange="setQPath(this)"></div>
      <div class="fg"><label class="fl">Estimated Timeline</label><input class="fi" placeholder="e.g. 8–12 weeks" value="${esc(S.q.timeline)}" data-path="timeline" onchange="setQPath(this)"></div>
    </div>
  </div>`;
}

function buildItemsTab(){
  if(!S.q||!S.q.items)return'<div class="empty"><div class="empty-t">Loading…</div></div>';
  const rows=S.q.items.map(it=>{
    const tot=(+it.qty||0)*(+it.unitPrice||0);
    const cats=Object.keys(CATS).map(k=>`<option value="${k}"${it.category===k?' selected':''}>${CATS[k].label}</option>`).join('');
    return`<tr>
      <td style="min-width:160px">
        <div class="cpill">${esc(CATS[it.category]?.label||it.category)}</div>
        <input class="ii" value="${esc(it.name)}" placeholder="Item name" oninput="updItem('${it.id}','name',this.value)">
      </td>
      <td style="min-width:140px"><input class="ii" value="${esc(it.description)}" placeholder="Description…" oninput="updItem('${it.id}','description',this.value)"></td>
      <td style="width:60px">
        <select class="iis" oninput="updItem('${it.id}','unit',this.value)">
          ${['LS','SF','LF','SY','EA','HR','DAY','TON','SQ','GAL'].map(u=>`<option${it.unit===u?' selected':''}>${u}</option>`).join('')}
        </select>
      </td>
      <td style="width:64px"><input class="ii" type="number" min="0" value="${esc(it.qty)}" oninput="updItem('${it.id}','qty',this.value)" style="text-align:center"></td>
      <td style="width:110px">
        <div style="position:relative">
          <span style="position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:.8rem">$</span>
          <input class="ii" type="number" min="0" value="${esc(it.unitPrice)}" oninput="updItem('${it.id}','unitPrice',this.value)" style="padding-left:18px">
        </div>
      </td>
      <td style="width:100px"><div class="i-amt" id="itot-${it.id}">${fmt(tot)}</div></td>
      <td style="min-width:110px"><input class="ii" value="${esc(it.notes)}" placeholder="Notes…" oninput="updItem('${it.id}','notes',this.value)"></td>
      <td><button class="btn btn-d btn-sm btn-icon" onclick="remItem('${it.id}')">✕</button></td>
    </tr>`;
  }).join('');

  const empty=`<div class="empty" style="padding:2.5rem 2rem">
    <div class="empty-i">🔨</div><div class="empty-t">No line items yet</div>
    <p style="font-size:.83rem;margin-bottom:1rem">Add from categories or create a custom item</p>
    <button class="btn btn-o" onclick="S.showPicker=true;render()">+ Add Line Items</button>
  </div>`;

  return`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem">
      <div class="sec-t" style="margin-bottom:0;border-bottom:none;padding-bottom:0">Line Items</div>
      <div style="display:flex;gap:7px">
        <button class="btn btn-m btn-sm" onclick="S.showTemplates=true;render()">📋 Templates</button>
        <button class="btn btn-m btn-sm" onclick="addCustomItem()">+ Custom Item</button>
        <button class="btn btn-o btn-sm" onclick="S.showPicker=true;render()">+ Add from Category</button>
      </div>

function addTmplItem(){
  const cat=document.getElementById('ti-cat')?.value||'permits';
  const name=(document.getElementById('ti-name')?.value||'').trim();
  const qty=parseFloat(document.getElementById('ti-qty')?.value)||1;
  const unit=document.getElementById('ti-unit')?.value||'LS';
  const price=parseFloat(document.getElementById('ti-price')?.value)||0;
  if(!name){document.getElementById('ti-name')?.focus();return;}
  if(!S.tmplItems)S.tmplItems=[];
  S.tmplItems.push({id:uid(),category:cat,name,description:'',unit,qty,unitPrice:price,notes:''});
  render();
  // After render, focus the name field again
  setTimeout(()=>{
    const el=document.getElementById('ti-name');
    if(el){el.value='';el.focus();}
    const qEl=document.getElementById('ti-qty');if(qEl)qEl.value='1';
    const pEl=document.getElementById('ti-price');if(pEl)pEl.value='0';
  },50);
}
function importCurrentItems(){
  if(!S.q||!S.q.items)return;
  if(!S.tmplItems)S.tmplItems=[];
  S.q.items.forEach(i=>S.tmplItems.push({...i,id:uid()}));
  render();
}
function saveCustomTemplate(){
  const name=(S.newTmplName||'').trim();
  if(!name){alert('Please enter a template name.');return;}
  const items=(S.tmplItems||[]);
  if(!items.length){alert('Add at least one item to the template.');return;}
  // Save to localStorage under custom templates
  const key='sky_tmpl_'+uid();
  const tmpl={key,name,desc:S.newTmplDesc||'',items,createdAt:tod()};
  let customs=[];
  try{const d=localStorage.getItem('sky_custom_tmpl');if(d)customs=JSON.parse(d);}catch(e){}
  customs.push(tmpl);
  localStorage.setItem('sky_custom_tmpl',JSON.stringify(customs));
  S.showCreateTemplate=false;S.newTmplName='';S.newTmplDesc='';S.tmplItems=[];
  alert('Template "'+name+'" saved!');
  render();
}
function loadCustomTemplates(){
  try{const d=localStorage.getItem('sky_custom_tmpl');return d?JSON.parse(d):[];}catch(e){return[];}
}
function deleteCustomTemplate(key){
  if(!confirm('Delete this template?'))return;
  let customs=loadCustomTemplates().filter(t=>t.key!==key);
  localStorage.setItem('sky_custom_tmpl',JSON.stringify(customs));
  render();
}

function saveNewCat(){
  const label=(S.newCatLabel||'').trim();
  if(!label){document.getElementById('new-cat-label')?.focus();return;}
  const ico=S.newCatIco||'📦';
  const cats=loadCustomCats();
  if(S.editingCatKey){
    // Edit mode — update existing
    const cat=cats.find(c=>c.key===S.editingCatKey);
    if(cat){cat.label=label;cat.ico=ico;}
    if(CATS[S.editingCatKey]){CATS[S.editingCatKey].label=label;CATS[S.editingCatKey].ico=ico;}
    localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
    S.editingCatKey=null;
  } else {
    // Create mode
    const key='custom_'+uid();
    const newCat={key,label,ico,items:[]};
    cats.push(newCat);
    localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
    CATS[key]={label,ico,items:[]};
    S.selCat=key;
  }
  S.newCatLabel='';S.newCatIco='📦';S.showNewCat=false;
  S.showPicker=true;
  render();
}

function loadCustomCats(){
  try{const d=localStorage.getItem('sky_custom_cats');return d?JSON.parse(d):[];}catch(e){return[];}
}

function deleteCustomCat(key){
  if(!confirm('Delete this category?'))return;
  const cats=loadCustomCats().filter(c=>c.key!==key);
  localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
  delete CATS[key];
  render();
}

function editCustomCat(key){
  const cats=loadCustomCats();
  const cat=cats.find(c=>c.key===key);
  if(!cat)return;
  S.newCatLabel=cat.label;
  S.newCatIco=cat.ico||'📦';
  S.editingCatKey=key;
  S.showNewCat=true;
  S.showPicker=false;
  render();
}

function confirmDeleteCat(key){
  const cat=loadCustomCats().find(c=>c.key===key);
  if(!cat)return;
  if(!confirm('Delete category "'+cat.label+'"? Items using this category will keep their data.'))return;
  const cats=loadCustomCats().filter(c=>c.key!==key);
  localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
  delete CATS[key];
  if(S.selCat===key)S.selCat=null;
  render();
}

function addItemToCat(catKey){
  const name=prompt('Item name to add to this category:','');
  if(!name||!name.trim())return;
  const cats=loadCustomCats();
  const cat=cats.find(c=>c.key===catKey);
  if(cat){
    if(!cat.items)cat.items=[];
    cat.items.push(name.trim());
    CATS[catKey].items.push(name.trim());
    localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
    render();
  }
}

function removeItemFromCat(catKey,itemIdx){
  const cats=loadCustomCats();
  const cat=cats.find(c=>c.key===catKey);
  if(cat&&cat.items){
    cat.items.splice(itemIdx,1);
    CATS[catKey].items.splice(itemIdx,1);
    localStorage.setItem('sky_custom_cats',JSON.stringify(cats));
    render();
  }
}

function addPhotos(input){
  const files=Array.from(input.files);
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      if(!S.q.photos) S.q.photos=[];
      S.q.photos.push({data:e.target.result,name:file.name,size:file.size});
      loaded++;
      if(loaded===files.length) render();
    };
    reader.readAsDataURL(file);
  });
}

function setQPath(el){
  const path=el.dataset.path;
  if(!path||!S.q)return;
  const parts=path.split('.');
  let o=S.q;
  for(let i=0;i<parts.length-1;i++){if(!o[parts[i]])o[parts[i]]={};o=o[parts[i]];}
  o[parts[parts.length-1]]=el.value;
}

  const item=S.q?.items?.find(i=>i.id===id);
  if(!item)return;
  item[field]=value;
  if(field==='qty'||field==='unitPrice'){
    const el=document.getElementById('itot-'+id);
    if(el)el.textContent=fmt((+item.qty||0)*(+item.unitPrice||0));

          placeholder="${esc(co.representative||'')}"
          value="${esc(q.tpaRep||'')}"
          oninput="S.q.tpaRep=this.value;document.querySelectorAll('.tpa-rep-name').forEach(el=>el.textContent=this.value||S.co.representative||'')"
        >
      </div>
      <div style="font-size:.72rem;color:var(--ink3)">Edita quién firma como Tercero Autorizado — se actualiza en tiempo real en el documento</div>
    </div>

    <div class="contract-doc">
      <!-- HEADER -->
      <div class="ct-hd">
        <div class="ct-hd-l">
          ${LOGO_LG}
          <div>
            <div class="ct-co">${esc(co.name)}</div>
            <div class="ct-tg">${esc(co.tagline)}</div>
            <div style="font-size:.54rem;color:rgba(210,206,196,.42);letter-spacing:1.2px;margin-top:2px">${esc(legalName)}</div>
          </div>
        </div>
        <div class="ct-badge">
          <div class="ct-badge-t">AUTH LETTER</div>
          <div class="ct-badge-n">${esc(tpaNum)}</div>
          <div style="font-size:.68rem;color:#E8E4DE;margin-top:2px">${today}</div>
        </div>
      </div>
      <div class="ct-bar"></div>

      <!-- LANG HEADER ES -->
      

      <div class="tpa-body">
        <div class="tpa-title">THIRD PARTY AUTHORIZATION &amp; OWNER REPRESENTATIVE DESIGNATION</div>
        <div class="tpa-sub">Autorización a Terceros y Designación de Representante</div>

        <div class="ct-parties" style="margin-bottom:1.25rem">
          <div class="ct-p">In the City of <strong>Miami, Florida</strong>, on <strong>${today}</strong>.</div>
          <div class="ct-p"><strong>PROPERTY OWNER / GRANTOR:</strong> <strong>${esc(clientName)}</strong>, as the lawful owner of the property described herein.</div>
          <div class="ct-p"><strong>AUTHORIZED THIRD PARTY:</strong> <strong class="tpa-rep-name">${esc(rep)}</strong>, acting on behalf of <strong>${esc(legalName)}</strong>, operating under the trade name <strong>${esc(co.name)} ${esc(co.tagline)}</strong>.</div>
        </div>

        <div class="tpa-field">
          <span class="tpa-field-lbl">Property Address</span>
          <div class="tpa-field-val"><strong>${esc(propAddr)}</strong></div>
        </div>

        <div class="tpa-field">
          <span class="tpa-field-lbl">Authorized Agencies</span>
          <div class="tpa-field-val">
            Miami-Dade County Building Department · Clerk of Courts<br>
            Miami-Dade County Property Appraiser · Tax Collector<br>
            City of Miami / Miami Shores Building &amp; Zoning Departments<br>
            Florida DBPR and any other county, municipal, or state agency related to the Property
          </div>
        </div>

        <div class="tpa-field">
          <span class="tpa-field-lbl">Authorized Third Party</span>
          <div class="tpa-field-val">
            <strong class="tpa-rep-name">${esc(rep)}</strong><br>
            ${esc(co.phone)} · ${esc(co.email)}<br>
            <strong>${esc(legalName)}</strong> · ${esc(co.address)}, ${esc(co.city)}, ${esc(co.state)} ${esc(co.zip)}
          </div>
        </div>

        <div class="tpa-warn">
          <strong>DISCLOSURE</strong>
          This authorization empowers the Authorized Third Party to act as the Property Owner&#39;s representative before public and private agencies related to the Property. It does NOT transfer ownership, grant a general power of attorney, or authorize the Third Party to encumber, mortgage, or dispose of the Property. The Authorized Third Party shall act solely in the Owner&#39;s name and interest, without assuming any financial or legal obligations inherent to the property.
        </div>

        <div class="tpa-body-txt">
          I, <strong>${esc(clientName)}</strong>, as the lawful owner of the property located at <strong>${esc(propAddr)}</strong>, hereby expressly authorize <strong class="tpa-rep-name">${esc(rep)}</strong>, acting on behalf of <strong>${esc(legalName)}</strong>, to perform the following on my behalf before the agencies listed above:
        </div>

        <div class="ct-cl" data-n="1" style="font-size:.83rem">Submit, manage, and obtain building permits, renovation permits, demolition permits, and any other permits related to the Property.</div>
        <div class="ct-cl" data-n="2" style="font-size:.83rem">Sign and file applications, blueprints, forms, declarations, and any documentation required by Miami-Dade County, the City, or the State of Florida.</div>
        <div class="ct-cl" data-n="3" style="font-size:.83rem">Represent the Owner in zoning matters, variances, Certificates of Occupancy, and building code compliance proceedings.</div>
        <div class="ct-cl" data-n="4" style="font-size:.83rem">Handle registrations, modifications, validations, certifications, and any other property-related procedures before the listed agencies.</div>
        <div class="ct-cl" data-n="5" style="font-size:.83rem">Receive notices, resolutions, approvals, or denials on behalf of the Owner, with the obligation to notify the Owner immediately.</div>
        <div class="ct-cl" data-n="6" style="font-size:.83rem">Coordinate construction inspections, post-permit procedures, and all steps required for successful project completion.</div>
        <div class="ct-cl" data-n="7" style="font-size:.83rem">Hire, with Owner&#39;s approval, architects, engineers, licensed builders and other professionals required for the Project.</div>

        <div class="tpa-body-txt" style="margin-top:1rem">
          The Authorized Third Party is expressly <strong>excluded</strong> from: (i) selling, mortgaging, encumbering, or disposing of the Property; (ii) incurring debts or obligations in the Owner&#39;s name; (iii) altering title documents; (iv) acting beyond the scope of management and representation before public and private agencies in connection with the remodeling project described in Service Agreement No. <strong>${esc(q.number.replace('EST','CONT'))}</strong>.
        </div>

        <div class="tpa-body-txt">
          This authorization shall remain valid until: (i) the successful completion of the remodeling project; (ii) express written revocation by the Owner with at least <strong>15 business days&#39;</strong> prior written notice to the Authorized Third Party; or (iii) termination of the Service Agreement between the Parties.
        </div>

        <div class="tpa-sig">
          <div class="tpa-sig-blk">
            <div class="tpa-sig-line">Owner Signature</div>
            <div class="tpa-sig-name" style="margin-top:4px">${esc(clientName)}</div>
            <div>Date: _________________________</div>
            <div style="margin-top:.5rem;font-size:.72rem;color:#9ca3af">Printed name: ________________</div>
          </div>
          <div class="tpa-sig-blk">
            <div class="tpa-sig-line">Authorized Third Party Signature</div>
            <div class="tpa-sig-name tpa-rep-name" style="margin-top:4px">${esc(rep)}</div>
            <div>${esc(legalName)}</div>
            <div>Date: _________________________</div>
          </div>
        </div>

        <div class="tpa-notary">
          <span class="tpa-notary-t">Notary Acknowledgment</span>
          State of Florida, County of Miami-Dade<br>
          The foregoing instrument was acknowledged before me this ______ day of ______________, 20___, by <strong>${esc(clientName)}</strong>, who is personally known to me or has produced _________________________ as identification.<br><br>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:.5rem">
            <div><div style="border-top:1px solid #D2CEC4;padding-top:4px;font-size:.69rem;color:#9ca3af">Notary Public Signature</div></div>
            <div><div style="border-top:1px solid #D2CEC4;padding-top:4px;font-size:.69rem;color:#9ca3af">Commission No. &amp; Expiration Date</div></div>
          </div>
        </div>
      </div>

      <div class="ct-footer">${esc(legalName)} · ${esc(co.name)} ${esc(co.tagline)} · ${esc(co.phone)} · ${esc(co.email)}</div>
    </div>
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────

// ─── AUTO-SAVE & PERSISTENCE ─────────────────────────────────────────────────
function autoSave(){
  if(S.q){collectFormData();saveQ();}
  persist();
  showSaveToast('Auto-saved');
}
// Auto-save every 4 minutes
setInterval(autoSave, 4*60*1000);

// Save before page unload/refresh
window.addEventListener('beforeunload', function(){
  if(S.q){collectFormData();saveQ();}
  persist();
});

// Save toast notification
function showSaveToast(msg){
  let t=document.getElementById('save-toast');
  if(!t){t=document.createElement('div');t.id='save-toast';
    t.style.cssText='position:fixed;bottom:1.25rem;right:1.25rem;background:#737065;color:#F5F3EF;padding:8px 16px;border-radius:6px;font-size:.76rem;font-family:Jost,sans-serif;letter-spacing:.5px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(44,42,39,.25)';
    document.body.appendChild(t);}
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity='0',2500);
}

load();restoreCustomCats();render();
</script>
</body>
</html>
